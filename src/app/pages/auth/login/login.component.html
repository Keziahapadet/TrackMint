<div class="login-container">
  <div class="login-card">
    
    <div class="logo-section">
      <img src="assets/images/logo.png" alt="TrackMint" class="logo">
    </div>

    <h2 class="heading">Welcome Back</h2>
    <p class="subheading">Sign in to continue to TrackMint</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email address"
            autocomplete="email"
            [class.error]="email?.invalid && email?.touched"
            [disabled]="isLoading"
          />
        </div>
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            [class.error]="password?.invalid && password?.touched"
            [disabled]="isLoading"
          />
          <button
            type="button"
            class="toggle-btn"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
        </div>
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="forgot-password">
        <a routerLink="/forgot-password"
           [class.disabled]="isLoading">
          Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading ||loginForm.invalid"
      [class.loading]="isLoading">
        <span *ngIf="isLoading">Logging in...</span>
        <span *ngIf="!isLoading">Log In</span>
      </button>


    <p class="register-link"
           [class.disabled]="isLoading">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
