<div class="notification-container">
  <button class="notification-bell" (click)="toggleDropdown()" (blur)="closeDropdown()">
    <span class="material-icons">notifications</span>
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
  </button>

  <div class="notification-dropdown" *ngIf="showDropdown" (click)="$event.stopPropagation()">
    <div class="dropdown-header">
      <h3>Notifications</h3>
      <button class="mark-read-btn" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
        <span class="material-icons">done_all</span>
        Mark all as read
      </button>
    </div>

    <div class="notifications-list">
      <!-- Loading State -->
      <div class="loading-state" *ngIf="isLoading">
        <div class="spinner"></div>
        <p>Loading notifications...</p>
      </div>

      <!-- Notifications -->
      <div *ngFor="let notification of notifications" 
           class="notification-item"
           [class.unread]="!notification.read"
           (click)="markAsRead(notification)">
        
        <div class="notification-icon" 
             [style.background]="getNotificationColor(notification.type) + '20'">
          <span class="material-icons" [style.color]="getNotificationColor(notification.type)">
            {{ getNotificationIcon(notification.type) }}
          </span>
        </div>

        <div class="notification-content">
          <div class="notification-header">
            <h4 class="notification-title">{{ notification.title }}</h4>
            <span class="notification-time">{{ notification.timeAgo }}</span>
          </div>
          <p class="notification-message">{{ notification.message }}</p>
          
          <!-- Budget Progress Bar -->
          <div class="budget-progress" *ngIf="notification.percentage">
            <div class="progress-bar">
              <div class="progress-fill" 
                   [style.width.%]="notification.percentage"
                   [style.background]="notification.percentage >= 100 ? '#EF4444' : '#F59E0B'">
              </div>
            </div>
            <span class="progress-text">{{ notification.percentage }}%</span>
          </div>

          <!-- Amount Display -->
          <div class="amount-display" *ngIf="notification.amount">
            <span class="amount-label">Amount:</span>
            <span class="amount-value">ksh {{ notification.amount | number:'1.2-2' }}</span>
          </div>
        </div>

        <button class="delete-btn" (click)="deleteNotification($event, notification.id)">
          <span class="material-icons">close</span>
        </button>
      </div>

      <!-- Empty State -->
      <div class="empty-state" *ngIf="!isLoading && notifications.length === 0">
        <span class="material-icons empty-icon">notifications_off</span>
        <p>No notifications</p>
      </div>
    </div>

    <div class="dropdown-footer">
      <button class="view-all-btn" (click)="viewAllNotifications()">
        View all notifications
        <span class="material-icons">arrow_forward</span>
      </button>
    </div>
  </div>
</div>
